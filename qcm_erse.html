<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCM ERSE L1 — Révisions Complètes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0a0e1a;
    --card: #111827;
    --border: #1e2d45;
    --accent: #3b82f6;
    --accent2: #10b981;
    --accent3: #f59e0b;
    --accent4: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --correct: #10b981;
    --wrong: #ef4444;
    --pending: #3b82f6;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Sora',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
    border-bottom: 1px solid var(--border);
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content:'';
    position:absolute;
    top:-50%;left:-50%;
    width:200%;height:200%;
    background: radial-gradient(ellipse at center, rgba(59,130,246,0.08) 0%, transparent 60%);
    animation: pulse 4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
  .header h1 { font-size:2rem; font-weight:800; letter-spacing:-1px; position:relative;
    background: linear-gradient(90deg,#60a5fa,#34d399,#fbbf24); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .header p { color:var(--muted); font-size:.9rem; margin-top:.5rem; position:relative; }

  /* NAV MATIERES */
  .nav-subjects {
    display:flex; gap:.5rem; flex-wrap:wrap; padding:1rem 1.5rem;
    background:var(--card); border-bottom:1px solid var(--border);
    position:sticky; top:0; z-index:100; overflow-x:auto;
  }
  .nav-btn {
    padding:.4rem .9rem; border-radius:20px; font-size:.75rem; font-weight:600;
    border:1px solid var(--border); background:transparent; color:var(--muted);
    cursor:pointer; transition:all .2s; white-space:nowrap; font-family:'Sora',sans-serif;
  }
  .nav-btn:hover, .nav-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  /* STATS BAR */
  .stats-bar {
    display:flex; gap:1rem; padding:.8rem 1.5rem;
    background:#0d1424; border-bottom:1px solid var(--border); flex-wrap:wrap;
  }
  .stat { display:flex; align-items:center; gap:.4rem; font-size:.8rem; }
  .stat-dot { width:8px; height:8px; border-radius:50%; }
  .stat span { color:var(--muted); }
  .stat strong { color:var(--text); }

  /* MATIERE SECTION */
  .subject-section { display:none; padding:1.5rem; max-width:900px; margin:0 auto; }
  .subject-section.active { display:block; }
  .subject-title {
    font-size:1.4rem; font-weight:800; margin-bottom:1.5rem;
    display:flex; align-items:center; gap:.7rem;
  }
  .subject-badge {
    font-size:.7rem; padding:.3rem .7rem; border-radius:10px;
    background:rgba(59,130,246,.15); color:var(--accent); border:1px solid rgba(59,130,246,.3);
    font-family:'JetBrains Mono',monospace;
  }

  /* QUESTION CARD */
  .question-card {
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:1.4rem; margin-bottom:1rem; transition:border-color .2s;
  }
  .question-card:hover { border-color:#2d3d5a; }
  .question-num {
    font-size:.7rem; color:var(--muted); font-family:'JetBrains Mono',monospace;
    margin-bottom:.6rem; text-transform:uppercase; letter-spacing:1px;
  }
  .question-text { font-size:.95rem; font-weight:600; line-height:1.6; margin-bottom:1rem; }
  .options { display:flex; flex-direction:column; gap:.5rem; }
  .option {
    padding:.7rem 1rem; border-radius:8px; border:1px solid var(--border);
    cursor:pointer; font-size:.88rem; transition:all .2s; display:flex; align-items:center; gap:.7rem;
    background: transparent; color:var(--text); text-align:left; font-family:'Sora',sans-serif;
  }
  .option:hover:not(.disabled) { border-color:var(--accent); background:rgba(59,130,246,.08); }
  .option.selected-correct { border-color:var(--correct); background:rgba(16,185,129,.12); color:#34d399; }
  .option.selected-wrong { border-color:var(--wrong); background:rgba(239,68,68,.12); color:#f87171; }
  .option.show-correct { border-color:var(--correct); background:rgba(16,185,129,.08); }
  .option.disabled { cursor:default; }
  .opt-letter {
    width:24px; height:24px; border-radius:6px; display:flex; align-items:center; justify-content:center;
    font-size:.75rem; font-weight:700; background:rgba(255,255,255,.06); flex-shrink:0;
    font-family:'JetBrains Mono',monospace;
  }
  .feedback { margin-top:.8rem; padding:.6rem .9rem; border-radius:8px; font-size:.82rem; display:none; }
  .feedback.correct { background:rgba(16,185,129,.1); color:#34d399; border:1px solid rgba(16,185,129,.2); display:block; }
  .feedback.wrong { background:rgba(239,68,68,.1); color:#f87171; border:1px solid rgba(239,68,68,.2); display:block; }

  /* PROGRESS */
  .progress-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
  .progress-bar { height:4px; background:#1e2d45; border-radius:2px; flex:1; margin:0 1rem; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:2px; transition:width .4s; }
  .progress-text { font-size:.75rem; color:var(--muted); font-family:'JetBrains Mono',monospace; }

  /* RESET BTN */
  .reset-btn {
    margin-top:1.5rem; padding:.6rem 1.4rem; border-radius:8px;
    background:rgba(59,130,246,.15); color:var(--accent); border:1px solid rgba(59,130,246,.3);
    cursor:pointer; font-size:.85rem; font-family:'Sora',sans-serif; font-weight:600;
    transition:all .2s;
  }
  .reset-btn:hover { background:var(--accent); color:#fff; }

  /* SCORE */
  .score-box {
    background:linear-gradient(135deg,rgba(16,185,129,.1),rgba(59,130,246,.1));
    border:1px solid rgba(59,130,246,.2); border-radius:12px;
    padding:1rem 1.4rem; margin-bottom:1.5rem; display:flex; align-items:center; gap:1rem;
  }
  .score-num { font-size:2rem; font-weight:800; font-family:'JetBrains Mono',monospace; color:var(--accent2); }
  .score-label { font-size:.85rem; color:var(--muted); }

  @media(max-width:600px) {
    .header h1 { font-size:1.4rem; }
    .subject-section { padding:1rem; }
    .question-text { font-size:.88rem; }
  }
</style>
</head>

const content = document.getElementById('content');
SUBJECTS.forEach(s => {

    </div>
    <div class="progress-row">

    </div>`;

  s.questions.forEach((q, qi) => {

      <div class="options">`;

      html += `<button class="option" id="opt-${s.id}-${qi}-${oi}" onclick="answer('${s.id}',${qi},${oi})">

// STATS BAR
function updateStats() {
  let total = 0, answered = 0, correct = 0;
  SUBJECTS.forEach(s => {
    total += s.questions.length;
    answered += Object.keys(state[s.id].answers).length;
    correct += state[s.id].score;
  });
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="stat-dot" style="background:#3b82f6"></div><span>Total questions : </span><strong>${total}</strong></div>
    <div class="stat"><div class="stat-dot" style="background:#f59e0b"></div><span>Répondues : </span><strong>${answered}</strong></div>
    <div class="stat"><div class="stat-dot" style="background:#10b981"></div><span>Correctes : </span><strong>${correct}</strong></div>
    <div class="stat"><div class="stat-dot" style="background:#ef4444"></div><span>Incorrectes : </span><strong>${answered - correct}</strong></div>
    <div class="stat"><div class="stat-dot" style="background:#8b5cf6"></div><span>Score global : </span><strong>${answered ? Math.round(correct/answered*100) : 0}%</strong></div>
  `;
}

function answer(sid, qi, oi) {
  const s = SUBJECTS.find(x => x.id === sid);
  const q = s.questions[qi];
  if (state[sid].answers[qi] !== undefined) return;

  state[sid].answers[qi] = oi;
  const isCorrect = oi === q.ans;
  if (isCorrect) state[sid].score++;

  const letters = ['A','B','C','D'];
  for (let i = 0; i < q.opts.length; i++) {
    const btn = document.getElementById(`opt-${sid}-${qi}-${i}`);
    btn.classList.add('disabled');
    if (i === q.ans) btn.classList.add('show-correct');
    if (i === oi && oi !== q.ans) btn.classList.add('selected-wrong');
    if (i === oi && oi === q.ans) btn.classList.add('selected-correct');
  }

  const fb = document.getElementById(`fb-${sid}-${qi}`);
  fb.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
  fb.innerHTML = (isCorrect ? '✅ ' : '❌ ') + q.exp;

  // update progress
  const answered = Object.keys(state[sid].answers).length;
  const pct = Math.round(answered / s.questions.length * 100);
  document.getElementById(`prog-${sid}`).style.width = pct + '%';
  document.getElementById(`prog-txt-${sid}`).textContent = `${answered}/${s.questions.length}`;
  document.querySelector(`#sec-${sid} .progress-row .progress-text`).textContent = pct + '%';
  document.getElementById(`scorenum-${sid}`).textContent = `${state[sid].score}/${s.questions.length}`;

  updateStats();
}

function resetSubject(sid) {
  const s = SUBJECTS.find(x => x.id === sid);
  state[sid] = { answers: {}, score: 0, total: s.questions.length };

  s.questions.forEach((q, qi) => {
    for (let oi = 0; oi < q.opts.length; oi++) {
      const btn = document.getElementById(`opt-${sid}-${qi}-${oi}`);
      btn.className = 'option';
      btn.onclick = () => answer(sid, qi, oi);
    }
    const fb = document.getElementById(`fb-${sid}-${qi}`);
    fb.className = 'feedback';
    fb.innerHTML = '';
  });

  document.getElementById(`prog-${sid}`).style.width = '0%';
  document.getElementById(`prog-txt-${sid}`).textContent = `0/${s.questions.length}`;
  document.querySelector(`#sec-${sid} .progress-row .progress-text`).textContent = '0%';
  document.getElementById(`scorenum-${sid}`).textContent = `0/${s.questions.length}`;
  updateStats();
}

function switchSubject(id) {
  document.querySelectorAll('.subject-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + id).classList.add('active');
  document.getElementById('nav-' + id).classList.add('active');
  activeSubject = id;
  window.scrollTo(0, 0);
}

updateStats();
</script>
</body>
</html>
